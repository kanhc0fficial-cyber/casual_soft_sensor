  - {name: "cx2_level_valve_pos", variable: "fx_s1_cx2_level_valve_sp", direction: 1, lag: 0, delta_std: 0.02, lambda: 0.05, require_dml_agree: true, min_abs_dml_effect: 0.01, use_in_train: true, use_in_eval: true, active_region: {type: "all"}}

