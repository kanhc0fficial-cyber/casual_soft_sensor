# ==============================================================================
# 配置文件：DML 正交残差软测量
# 用法：python scripts/train_dml_residual_soft_sensor.py --config configs/residual_soft_sensor.yaml
# ==============================================================================

# ── 数据路径 ──────────────────────────────────────────────────────────────────
data_path: "C:/Users/goldenwhale/Downloads/my_mining_simulation/output/simulation_2months_seq_hybrid_normal_fast_sampling.parquet"
dag_path: "data/features/global_edges.csv"
output_dir: "results/residual_soft_sensor"

# ── 目标变量与时间列 ───────────────────────────────────────────────────────────
target_col: "y_fx_xin1"                 # 浮选系统1精矿品位
time_col: "t"                           # 时间列

# ── 操作变量（人工指定，必填） ───────────────────────────────────────────────
# 浮选系统1的关键操作变量：药剂添加、充气量、液位控制、温度控制
operation_vars:
  # 药剂添加频率（捕收剂、调整剂）
  - "fx_s1_td_rough_freq"
  - "fx_s1_naoh_freq"
  - "fx_s1_cao_freq"
  # 粗选浮选槽充气量设定
  - "fx_s1_cx1_air_sp"
  - "fx_s1_cx2_air_sp"
  - "fx_s1_cx3_air_sp"
  # 精选浮选槽充气量设定
  - "fx_s1_jx_air_sp"
  # 扫选浮选槽充气量设定
  - "fx_s1_sx1_air_sp"
  - "fx_s1_sx2_air_sp"
  - "fx_s1_sx3_air_sp"
  # 液位阀门设定
  - "fx_s1_cx1_level_valve_sp"
  - "fx_s1_cx2_level_valve_sp"
  - "fx_s1_cx3_level_valve_sp"
  # 温度控制（蒸汽设定）
  - "fx_s1_tk1_steam_sp"
  - "fx_s1_tk2_steam_sp"
  - "fx_s1_tk3_steam_sp"

# ── 排除列（不参与任何建模的列，如 ID、标签衍生列等） ───────────────────────
# 排除实验室化验数据（lab_开头）和另一个系统的目标变量
exclude_cols:
  - "y_fx_xin2"  # 排除系统2的目标变量
  # 排除所有实验室化验数据（这些是离线数据，不适合实时软测量）
  - "lab_1_eryi_f200"
  - "lab_1_eryi_tfe"
  - "lab_2_eryi_f200"
  - "lab_2_eryi_tfe"
  - "lab_3_eryi_f200"
  - "lab_3_eryi_tfe"
  - "lab_mag_wm_conc_tfe"
  - "lab_mag_wm_tail_tfe"
  - "lab_mag_hm_conc_tfe"
  - "lab_mag_hm_tail_tfe"
  - "lab_mag_sw_conc_tfe"
  - "lab_mag_sw_tail_tfe"
  - "lab_mag_mixed_conc_tfe"
  - "lab_mag_tube_conc_tfe"
  - "lab_mag_tube_yield"
  - "lab_tm_feed_f325"
  - "lab_tm_discharge_f325"
  - "lab_tm_overflow_f325"
  - "lab_tm_overflow_tfe"
  - "lab_tm_overflow_conc"
  - "lab_tm_sand_f325"
  - "lab_flo_feed_tfe_s1"
  - "lab_flo_feed_f325_s1"
  - "lab_flo_conc_tfe_s1"
  - "lab_flo_tail_tfe_s1"
  - "lab_flo_rough_conc_tfe_s1"
  - "lab_flo_rough_tail_tfe_s1"
  - "lab_flo_clean_tail_tfe_s1"
  - "lab_flo_scav1_conc_tfe_s1"
  - "lab_flo_scav1_tail_tfe_s1"
  - "lab_flo_scav2_conc_tfe_s1"
  - "lab_flo_scav2_tail_tfe_s1"
  - "lab_flo_scav3_conc_tfe_s1"
  - "lab_flo_final_conc_yield_s1"
  - "lab_flo_final_conc_recovery_s1"
  - "lab_flo_feed_tfe_s2"
  - "lab_flo_feed_f325_s2"
  - "lab_flo_conc_tfe_s2"
  - "lab_flo_tail_tfe_s2"
  - "lab_flo_rough_conc_tfe_s2"
  - "lab_flo_rough_tail_tfe_s2"
  - "lab_flo_clean_tail_tfe_s2"
  - "lab_flo_scav1_conc_tfe_s2"
  - "lab_flo_scav1_tail_tfe_s2"
  - "lab_flo_scav2_conc_tfe_s2"
  - "lab_flo_scav2_tail_tfe_s2"
  - "lab_flo_scav3_conc_tfe_s2"
  - "lab_flo_final_conc_yield_s2"
  - "lab_flo_final_conc_recovery_s2"

# ── 数据切分比例（总计须为 1.0） ─────────────────────────────────────────────
train_ratio: 0.70
val_ratio:   0.15
test_ratio:  0.15

# ── 滑动窗口 ──────────────────────────────────────────────────────────────────
window_size: 12

# ── 残差化基模型（g_model 和 q_model 共用） ───────────────────────────────────
# 可选：lightgbm | random_forest | mlp
residualization_model: "lightgbm"

# ── 残差序列模型 ──────────────────────────────────────────────────────────────
# 目前支持：lstm
residual_sequence_model: "lstm"

# ── LSTM 超参 ─────────────────────────────────────────────────────────────────
lstm_hidden_size: 64
lstm_num_layers: 2
lstm_dropout: 0.1
lstm_epochs: 50
lstm_batch_size: 64
lstm_lr: 0.001
lstm_patience: 8

# ── 随机种子 ──────────────────────────────────────────────────────────────────
random_seed: 42

# ── 外部 DML 效应权重（Model 2）───────────────────────────────────────────────
external_dml_effect_dir: "dml_causal_effect_value/结果/20260516_062800"
dml_effect_variable_col: null
dml_effect_value_col: null
dml_weight_clip_min: 0.3
dml_weight_clip_max: 3.0
state_weight_default: 1.0
missing_effect_weight: 1.0

# ── 新增：人工 DML 权重（Model 2）────────────────────────────────────────────
# 若已运行 run_manual_dml_jobs_xin1.py，将此项设为 true 并填写路径
dml_weight_use_manual_selected: true
manual_dml_weight_path: "dml_causal_effect_value/结果/manual_20260516_134710/manual_dml_theta_selected_for_weight.csv"
# 列名配置（与 manual_dml_theta_selected_for_weight.csv 对应，一般无需改动）
dml_weight_value_col: "theta_std"
dml_weight_variable_col: "resolved_treatment"
dml_weight_recommended_col: "recommended_for_weight"

# ── 演示模式（默认关闭） ─────────────────────────────────────────────────────
# 设为 true 时，若 data_path 文件不存在，脚本会自动使用合成演示数据运行。
# 生产环境请保持 false，否则数据缺失时脚本会产出"伪成功"结果。
allow_synthetic_demo: false

# ── 约束配置（可用命令行覆盖用于消融）────────────────────────────────────────────
constraints_enabled: true

use_counterfactual_constraint: false
counterfactual_lambda: 0.0
counterfactual_delta_std: 0.05
counterfactual_apply_to: operation_A_only
counterfactual_min_abs_effect: 0.0
counterfactual_require_recommended: true
counterfactual_use_last_step_only: true
counterfactual_default_lag: 0

use_process_constraint: false
process_lambda: 0.0
process_delta_std: 0.05
process_require_dml_agree: true
process_use_in_train_default: false
process_use_in_eval_default: true

process_constraints: []
deterministic: true
save_run_manifest: true
