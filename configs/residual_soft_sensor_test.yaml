lstm_hidden_size: 32      # 减小
lstm_num_layers: 1        # 减少层数
lstm_dropout: 0.1
lstm_epochs: 10           # 减少epochs
lstm_batch_size: 128      # 增大batch
lstm_lr: 0.001
lstm_patience: 5

random_seed: 42
allow_synthetic_demo: false
